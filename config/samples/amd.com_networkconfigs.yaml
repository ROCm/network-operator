apiVersion: amd.com/v1alpha1
kind: NetworkConfig
metadata:
  name: test-NetworkConfig
  # it is highly recommended to use the namespace where AMD Network Operator is running
  namespace: kube-amd-network
spec:
  driver:
    # Specify driver image here
    # DO NOT include the image tag as AMD Network Operator will automatically manage the image tag for you
    # e.g. docker.io/myUserName/amdnetwork-driver
    image: my.registry.io/myUserName/myRepo

    # Specify the credential for your private registry if it requires credential to get pull/push access
    # you can create the docker-registry type secret by running command like:
    # kubectl create secret docker-registry mySecret -n KMM-NameSpace --docker-server=https://index.docker.io/v1/ --docker-username=xxx --docker-password=xxx
    # Make sure you created the secret within the namespace that KMM operator is running
    imageRegistrySecret:
      name: docker-auth

    # Specify the driver version
    # when you need to upgrade the driver, just update this field
    # we will unload the old version driver and load the new version driver
    version: "6.2.2"

    # Optional: Configure image build settings
    # imageBuild:
    #   # Registry for OS base images (default: docker.io)
    #   # e.g. For Ubuntu 22.04, base image will be <baseImageRegistry>/ubuntu:22.04
    #   # Note: This field does not apply to OpenShift (OpenShift uses DriverToolKit)
    #   baseImageRegistry: docker.io
    #
    #   # TLS settings for base image registry
    #   baseImageRegistryTLS:
    #     insecure: false
    #     insecureSkipTLSVerify: false
    #
    #   # Driver source image repository (OpenShift only, used with useSourceImage)
    #   # Default: docker.io/rocm/amdainic-driver
    #   sourceImageRepo: docker.io/rocm/amdainic-driver
    #
    # # Toggle between source-based and package-based builds (OpenShift only)
    # # useSourceImage: true

  devicePlugin:
    # Specify the device plugin image
    # default value is rocm/k8s-device-plugin:latest
    devicePluginImage: rocm/k8s-device-plugin:latest

    # Specify the node labeller image
    # default value is rocm/k8s-device-plugin:labeller-latest
    nodeLabellerImage: rocm/k8s-device-plugin:labeller-latest

  # Specifythe node to be managed by this NetworkConfig Custom Resource
  selector:
    feature.node.kubernetes.io/amd-nic: "true"
