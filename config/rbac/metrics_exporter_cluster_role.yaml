apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metrics-exporter
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  verbs:
  - watch
  - get
  - list
  - update
- apiGroups:
  - security.openshift.io
  resourceNames:
  - privileged
  resources:
  - securitycontextconstraints
  verbs:
  - use
